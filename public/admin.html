<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商品賣場管理</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Admin</p>
        <h1>商品賣場管理</h1>
      </div>
      <nav class="header-actions">
        <a class="admin-link is-current" href="/admin.html">商品管理</a>
        <a class="admin-link" href="/admin-stats.html">數據統計</a>
        <a class="admin-link" href="/admin-chat.html">買家聊聊</a>
        <a class="admin-link" href="/admin-tools.html">匯入同步</a>
        <a class="admin-link" href="/admin-orders.html">訂單後台</a>
        <a class="admin-link" href="/">下單頁</a>
        <button type="button" id="logoutButton">登出</button>
      </nav>
    </header>

    <main class="admin-main">

      <section>
        <div class="section-head">
          <h2>商品資料</h2>
          <button type="button" id="refreshCatalog">重新整理</button>
        </div>
        <div class="admin-search-panel">
          <input id="productSearchInput" type="search" placeholder="搜尋 商品名稱, 主商品貨號, 商品選項貨號, 商品ID" autocomplete="off">
          <p id="productSearchCount" class="admin-search-count">0 件商品</p>
        </div>
        <div id="catalogEditor" class="catalog-editor"></div>
      </section>
    </main>

    <script src="/admin-common.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>

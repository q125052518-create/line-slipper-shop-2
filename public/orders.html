<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的訂單</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="orders-page">
    <header class="app-header">
      <div>
        <p class="eyebrow">Orders</p>
        <h1>我的訂單</h1>
      </div>
      <nav class="header-actions">
        <a class="cart-link" href="/">繼續購物</a>
        <a class="cart-link" href="/cart.html">購物車</a>
        <a class="cart-link hidden" data-buyer-chat href="/chat.html">聊聊</a>
        <button id="buyerLogoutButton" class="hidden" data-buyer-logout type="button">登出</button>
        <a class="admin-link hidden" data-admin-link href="/admin.html">後台</a>
      </nav>
    </header>

    <main class="orders-layout">
      <section id="buyerAuthPanel" class="checkout order-lookup-panel">
        <div class="auth-tabs">
          <button type="button" class="is-selected" data-auth-mode="login">登入</button>
          <button type="button" data-auth-mode="register">註冊</button>
        </div>

        <form id="buyerLoginForm" class="order-form">
          <h2>買家登入</h2>
          <label>
            帳號或手機號碼
            <input name="phone" autocomplete="username" required>
          </label>
          <label>
            密碼
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">登入</button>
        </form>

        <form id="buyerRegisterForm" class="order-form hidden">
          <h2>建立帳號</h2>
          <label>
            姓名
            <input name="name" autocomplete="name" required>
          </label>
          <label>
            手機號碼
            <input name="phone" autocomplete="tel" required>
          </label>
          <label>
            密碼
            <input name="password" type="password" autocomplete="new-password" minlength="6" required>
          </label>
          <button type="submit">註冊並登入</button>
        </form>

        <p id="authMessage" class="message"></p>
      </section>

      <section class="catalog-panel">
        <div class="section-head">
          <div>
            <h2>訂單紀錄</h2>
            <p id="buyerSummary" class="muted">請先登入買家帳號。</p>
          </div>
          <button id="refreshOrdersButton" class="hidden" type="button">重新整理</button>
        </div>
        <div id="orders" class="orders"></div>
      </section>
    </main>

    <script src="/header.js"></script>
    <script src="/orders.js"></script>
  </body>
</html>

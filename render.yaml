services:
  - type: web
    name: line-slipper-shop-2
    runtime: node
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    disks:
      - name: line-slipper-shop-2-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LIFF_ID
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "1"
      - key: RENDER_BACKGROUND_SYNC_ENABLED
        value: "false"
      - key: MALLBIC_ACCOUNT
        sync: false
      - key: MALLBIC_PASSWORD
        sync: false
      - key: MALLBIC_COMPANY_NAME
        value: ???????
      - key: MALLBIC_AUTO_SYNC_ENABLED
        value: "false"
      - key: MALLBIC_AUTO_SYNC_INTERVAL_MS
        value: "600000"
      - key: MALLBIC_ORDER_AUTO_SYNC_ENABLED
        value: "false"
      - key: MALLBIC_ORDER_AUTO_SYNC_INTERVAL_MS
        value: "300000"
